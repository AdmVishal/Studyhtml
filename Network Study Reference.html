{id:"vpn-intro",p:"vpn",label:"VPN Introduction",content:`
<h1 id="introduction-to-vpn">Introduction to VPN</h1>
<span class="badge-proto badge-vpn">VPN</span>
<h2 id="what-is-a-vpn">What is a VPN?</h2>
<p>A <strong>Virtual Private Network (VPN)</strong> creates a secure, encrypted tunnel over a public network (like the Internet) to connect private networks or users. It allows organisations with multiple branch offices to share internal resources securely over the cheap but insecure internet.</p>
<div class="cards">
<div class="card"><div class="card-title">Virtual</div><p>The connection is logical, not physical. No dedicated cable like a leased line is needed.</p></div>
<div class="card"><div class="card-title">Private</div><p>Traffic is secure and encrypted. Only the communicating devices can read the data.</p></div>
</div>

<h2 id="why-vpn">Why VPN?</h2>
<ul>
<li>Companies have multiple branch offices that need to share internal resources</li>
<li>Internet is cheap but insecure — data can be <strong>sniffed</strong>, <strong>modified</strong>, or <strong>impersonated</strong></li>
<li>VPN solves all three problems through CIA security goals</li>
</ul>

<h2 id="security-goals-of-vpn-cia-triad">Security Goals of VPN — CIA Triad</h2>
<div class="cards">
<div class="card"><div class="card-title">🔒 Confidentiality (Encryption)</div><p>Data is unreadable to unauthorised users. Even if packets are captured, contents cannot be understood. Algorithms: AES, 3DES, ChaCha20.</p></div>
<div class="card"><div class="card-title">✅ Integrity (Hashing)</div><p>Data is not modified during transmission. Hashing generates a message digest. If the packet changes, the hash won't match. Algorithms: MD5, SHA-1, SHA-256.</p></div>
<div class="card"><div class="card-title">🪪 Authentication (Identity)</div><p>Verifies identity of communicating devices before creating the tunnel. Methods: Pre-Shared Key (PSK), Digital Certificates (PKI).</p></div>
</div>

<h2 id="without-vpn-vs-with-vpn">Without VPN vs With VPN</h2>
<pre><span class="cmt">Without VPN — Plain Text</span>
Branch → Internet → HQ
Username: admin
Password: 12345    ← visible to anyone sniffing

<span class="cmt">With VPN — Encrypted Tunnel</span>
Branch → [Encrypted Tunnel] → HQ
Encrypted Data: @!rvvr8tv9e435$c3njf32&32)3$</pre>

<h2 id="vpn-technologies-covered">VPN Technologies Covered</h2>
<ul>
<li><strong>GRE Tunnel</strong> — Generic Routing Encapsulation</li>
<li><strong>IPsec VPN</strong> — IP Security with IKEv1/IKEv2</li>
<li><strong>Site-to-Site VPN</strong> — Permanent encrypted tunnels between sites</li>
<li><strong>DMVPN</strong> — Dynamic Multipoint VPN</li>
<li><strong>FlexVPN</strong> — Cisco's IKEv2-based VPN framework</li>
</ul>
`},

{id:"vpn-gre",p:"vpn",label:"GRE Tunnel",content:`
<h1 id="gre-tunnel">GRE Tunnel</h1>
<span class="badge-proto badge-vpn">VPN</span>
<h2 id="what-is-gre">What is GRE?</h2>
<p>A <strong>GRE (Generic Routing Encapsulation)</strong> tunnel encapsulates various network-layer protocols inside a virtual point-to-point link between two routers over an intermediate network like the Internet.</p>
<div class="cards">
<div class="card"><div class="card-title">GRE Alone</div><p>Supports routing protocols (EIGRP, OSPF, BGP, multicast) but has <strong>NO encryption</strong>.</p></div>
<div class="card"><div class="card-title">IPsec Alone</div><p>Provides encryption but does <strong>NOT support</strong> multicast or dynamic routing protocols.</p></div>
<div class="card"><div class="card-title">GRE + IPsec</div><p>Best of both: secure encrypted tunnels that also support dynamic routing protocols and IPv6.</p></div>
</div>

<h2 id="how-gre-works">How GRE Works</h2>
<ol>
<li><strong>Encapsulation:</strong> GRE encapsulates the original IP packet inside a new IP packet with a GRE header</li>
<li><strong>Tunneling:</strong> The encapsulated packet travels over the intermediate network</li>
<li><strong>Decapsulation:</strong> Receiving router strips the GRE header and forwards the original packet</li>
</ol>

<h2 id="gre-tunnel-configuration">GRE Tunnel Configuration</h2>
<pre><span class="cmt">! Prerequisites: ensure physical routing reachability first</span>
<span class="cmt">! Configure tunnel on R3 (source 200.0.1.2, destination 200.0.4.2)</span>
R3(config)#<span class="cmd">Interface Tunnel 1</span>
R3(config-if)#<span class="cmd">tunnel source</span> <span class="net">200.0.1.2</span>
R3(config-if)#<span class="cmd">tunnel destination</span> <span class="net">200.0.4.2</span>
R3(config-if)#<span class="cmd">ip address</span> <span class="net">192.168.10.1 255.255.255.0</span>

<span class="cmt">! Configure tunnel on R8 (reverse)</span>
R8(config)#<span class="cmd">Interface Tunnel 1</span>
R8(config-if)#<span class="cmd">tunnel source</span> <span class="net">200.0.4.2</span>
R8(config-if)#<span class="cmd">tunnel destination</span> <span class="net">200.0.1.2</span>
R8(config-if)#<span class="cmd">ip address</span> <span class="net">192.168.10.2 255.255.255.0</span>

<span class="cmt">! Run EIGRP over the tunnel for dynamic routing</span>
R3(config)#<span class="cmd">router eigrp 1</span>
R3(config-router)#<span class="cmd">network</span> <span class="net">192.168.10.0</span>
R3(config-router)#<span class="cmd">network</span> <span class="net">10.0.1.0</span></pre>

<h2 id="ipsec-over-gre-full-configuration">IPsec over GRE — Full Configuration</h2>
<h3 id="step-1-configure-eigrp-physical-underlay">Step 1: Configure EIGRP (Physical Underlay)</h3>
<pre>R1(config)#<span class="cmd">router eigrp 100</span>
R1(config-router)#<span class="cmd">no auto-summary</span>
R1(config-router)#<span class="cmd">network</span> <span class="net">192.168.10.0 0.0.0.255</span></pre>

<h3 id="step-2-create-gre-tunnel">Step 2: Create GRE Tunnel</h3>
<pre>R1(config)#<span class="cmd">interface tunnel0</span>
R1(config-if)#<span class="cmd">ip address</span> <span class="net">172.16.0.1 255.255.255.252</span>
R1(config-if)#<span class="cmd">tunnel source</span> <span class="net">192.168.10.1</span>
R1(config-if)#<span class="cmd">tunnel destination</span> <span class="net">192.168.12.2</span></pre>

<h3 id="step-3-configure-isakmp-policy-ikev1">Step 3: Configure ISAKMP Policy (IKEv1)</h3>
<pre>R1(config)#<span class="cmd">crypto isakmp policy 10</span>
R1(config-isakmp)#<span class="cmd">encryption aes</span>
R1(config-isakmp)#<span class="cmd">hash sha</span>
R1(config-isakmp)#<span class="cmd">authentication pre-share</span>
R1(config-isakmp)#<span class="cmd">group 2</span>
R1(config-isakmp)#<span class="cmd">lifetime 86400</span>
R1(config)#<span class="cmd">crypto isakmp key CISCO address</span> <span class="net">192.168.12.2</span></pre>

<h3 id="step-4-transform-set-acl">Step 4: Transform Set & ACL</h3>
<pre>R1(config)#<span class="cmd">crypto ipsec transform-set GRE-SET esp-aes esp-sha-hmac</span>
R1(cfg-crypto-trans)#<span class="cmd">mode transport</span>
R1(config)#<span class="cmd">access-list 101 permit gre host</span> <span class="net">192.168.10.1</span> <span class="cmd">host</span> <span class="net">192.168.12.2</span></pre>

<h3 id="step-5-crypto-map-apply">Step 5: Crypto Map & Apply</h3>
<pre>R1(config)#<span class="cmd">crypto map VPN-MAP 10 ipsec-isakmp</span>
R1(config-crypto-map)#<span class="cmd">set peer</span> <span class="net">192.168.12.2</span>
R1(config-crypto-map)#<span class="cmd">set transform-set GRE-SET</span>
R1(config-crypto-map)#<span class="cmd">match address 101</span>
R1(config)#<span class="cmd">interface GigabitEthernet0/0</span>
R1(config-if)#<span class="cmd">crypto map VPN-MAP</span></pre>

<h3 id="verification">Verification</h3>
<pre><span class="cmd">show ip interface brief</span>
<span class="cmd">show ip route</span>
<span class="cmd">show crypto isakmp sa</span>
<span class="cmd">show crypto ipsec sa</span>
<span class="cmd">show interfaces Tunnel0</span>
<span class="cmd">ping 172.16.0.2 source 172.16.0.1</span></pre>
`},
