// ── Build UI ──────────────────────────────────────────────────────

const sidebar = document.getElementById('sidebar');
const container = document.getElementById('topics-container');
const catNav = document.getElementById('cat-nav');

let currentCat = 'all';
let currentTopic = null;

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    (acc[item[key]] = acc[item[key]] || []).push(item);
    return acc;
  }, {});
}

const catLabels = {
  'network-fundamentals': 'Network Fundamentals',
  'addressing': 'IP Addressing',
  'switching': 'Switching',
  'routing': 'Routing',
  'wan': 'WAN & Services',
  'security': 'Security',
  'automation': 'Automation'
};

function buildSidebar(cat) {
  sidebar.innerHTML = '';
  const filtered = cat === 'all' ? topics : topics.filter(t => t.cat === cat);
  const groups = cat === 'all' ? groupBy(filtered, 'cat') : { [cat]: filtered };
  
  const order = ['network-fundamentals', 'addressing', 'switching', 'routing', 'wan', 'security', 'automation'];
  const sortedKeys = order.filter(k => groups[k]);

  sortedKeys.forEach(groupKey => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = catLabels[groupKey] || groupKey;
    sidebar.appendChild(label);
    
    groups[groupKey].forEach(topic => {
      const btn = document.createElement('button');
      btn.className = 'topic-btn' + (currentTopic === topic.id ? ' active' : '');
      btn.textContent = topic.title;
      btn.dataset.id = topic.id;
      btn.addEventListener('click', () => showTopic(topic.id));
      sidebar.appendChild(btn);
    });
  });
}

function buildPanels() {
  container.innerHTML = '';
  topics.forEach(topic => {
    const div = document.createElement('div');
    div.className = 'topic-panel';
    div.id = 'panel-' + topic.id;
    div.innerHTML = topic.content;
    container.appendChild(div);
  });
}

function showTopic(id) {
  document.querySelectorAll('.topic-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('topics-container').style.display = '';
  
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  
  document.querySelectorAll(`.topic-btn[data-id="${id}"]`).forEach(b => b.classList.add('active'));
  currentTopic = id;
  
  // Scroll panel to top
  document.querySelector('.content').scrollTo(0, 0);
}

// Category nav
catNav.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    catNav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    buildSidebar(currentCat);
    // Show first topic in category
    const firstTopic = currentCat === 'all' ? topics[0] : topics.find(t => t.cat === currentCat);
    if (firstTopic) showTopic(firstTopic.id);
  });
});

// Search
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  
  if (!q) {
    searchResults.style.display = 'none';
    document.getElementById('topics-container').style.display = '';
    if (currentTopic) showTopic(currentTopic);
    return;
  }
  
  document.getElementById('topics-container').style.display = 'none';
  searchResults.style.display = 'block';
  
  const results = topics.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.content.toLowerCase().includes(q)
  );
  
  if (results.length === 0) {
    searchResults.innerHTML = '<p style="color:var(--text-muted);padding:20px">No results found.</p>';
    return;
  }
  
  searchResults.innerHTML = `<p style="color:var(--text-muted);font-size:12px;margin-bottom:16px">${results.length} topic${results.length > 1 ? 's' : ''} found</p>`;
  
  results.forEach(t => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `
      <div class="sri-topic">${t.tag} → ${t.title}</div>
      <div class="sri-text">${t.title} — click to view full notes</div>
    `;
    item.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.style.display = 'none';
      searchResults.style.display = 'none';
      document.getElementById('topics-container').style.display = '';
      buildSidebar(currentCat);
      showTopic(t.id);
    });
    searchResults.appendChild(item);
  });
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchResults.style.display = 'none';
  document.getElementById('topics-container').style.display = '';
  if (currentTopic) showTopic(currentTopic);
});

// Init
buildPanels();
buildSidebar('all');
showTopic(topics[0].id);
</script>
</body>
</html>
