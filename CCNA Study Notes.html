<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CCNA Study Notes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00c9ff;
    --accent2: #7b61ff;
    --accent3: #00e5a0;
    --warn: #ff9f40;
    --danger: #ff4f6d;
    --text: #e2e8f0;
    --text-dim: #7a8ba8;
    --text-muted: #3d5068;
    --font: 'Sora', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0f1d35 50%, #0a0e1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .logo {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .subtitle { color: var(--text-dim); font-size: 12px; margin-left: auto; }

  /* ── SEARCH ── */
  .search-wrap {
    margin-bottom: 16px;
    position: relative;
    max-width: 400px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px 8px 38px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  #search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    display: none;
    line-height: 1;
  }

  /* ── CATEGORY NAV ── */
  .cat-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 1px;
  }
  .cat-nav::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 8px 14px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-btn:hover { color: var(--text); }
  .cat-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    gap: 0;
    height: calc(100vh - 130px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .topic-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-left: 3px solid transparent;
    padding: 11px 16px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .topic-btn:hover { background: var(--surface2); color: var(--text); }
  .topic-btn.active {
    background: var(--surface2);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .section-label {
    padding: 14px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .topic-panel { display: none; animation: fadeIn 0.25s ease; }
  .topic-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topic-panel h2 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
    color: var(--text);
  }
  .topic-panel .topic-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .topic-panel h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }
  .topic-panel h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    margin: 18px 0 8px;
  }
  .topic-panel p {
    color: var(--text);
    margin-bottom: 10px;
    font-size: 13.5px;
    line-height: 1.75;
  }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin: 16px 0; }
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--accent3); margin-bottom: 6px; }
  .card p { font-size: 12.5px; color: var(--text-dim); margin: 0; line-height: 1.6; }

  /* Code */
  pre, code {
    font-family: var(--mono);
    font-size: 12px;
    background: #060b15;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #a8d8ff;
  }
  pre { padding: 14px 18px; overflow-x: auto; margin: 10px 0 16px; line-height: 1.7; }
  code { padding: 2px 7px; font-size: 11.5px; }

  /* Table */
  .tbl-wrap { overflow-x: auto; margin: 12px 0 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { background: var(--surface2); color: var(--accent); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
  td { padding: 9px 14px; border: 1px solid var(--border); color: var(--text-dim); vertical-align: top; }
  tr:hover td { background: var(--surface2); color: var(--text); }

  /* List */
  ul, ol { padding-left: 20px; margin: 8px 0 14px; }
  li { color: var(--text-dim); font-size: 13px; margin-bottom: 5px; line-height: 1.65; }
  li strong { color: var(--text); }

  /* Note / highlight boxes */
  .note {
    border-left: 3px solid var(--accent3);
    background: rgba(0,229,160,0.05);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 14px 0;
    font-size: 13px;
  }
  .warn {
    border-left: 3px solid var(--warn);
    background: rgba(255,159,64,0.06);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 14px 0;
    font-size: 13px;
  }
  .danger-box {
    border-left: 3px solid var(--danger);
    background: rgba(255,79,109,0.06);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 14px 0;
    font-size: 13px;
  }

  /* Badge */
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    margin: 2px 3px;
  }
  .badge-blue { background: rgba(0,201,255,0.15); color: var(--accent); }
  .badge-purple { background: rgba(123,97,255,0.15); color: var(--accent2); }
  .badge-green { background: rgba(0,229,160,0.15); color: var(--accent3); }
  .badge-orange { background: rgba(255,159,64,0.15); color: var(--warn); }

  /* Search highlight */
  mark { background: rgba(0,201,255,0.25); color: var(--accent); border-radius: 2px; padding: 0 2px; }

  /* Search results overlay */
  #search-results {
    display: none;
    padding: 20px 40px;
  }
  .search-result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .search-result-item:hover { border-color: var(--accent); }
  .sri-topic { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .sri-text { font-size: 13px; color: var(--text-dim); }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* IP calc highlight colors */
  .ip-octet { color: var(--warn); font-weight: 700; }
  .subnet-part { color: var(--accent3); font-weight: 700; }
  .host-part { color: var(--accent2); font-weight: 700; }
</style>

<script>
(function(){
var nav=document.getElementById('shn-nav'),
    ov=document.getElementById('shn-overlay'),
    btn=document.getElementById('shn-btn');
window.shnOpen=function(){nav.classList.add('on');ov.classList.add('on');btn.innerHTML='&#10005;';};
window.shnClose=function(){nav.classList.remove('on');ov.classList.remove('on');btn.innerHTML='&#9776;';};
var lnks=nav.querySelectorAll('.shn-lnk[href^="#"]');
window.addEventListener('scroll',function(){
  var y=window.scrollY+90,act=null;
  lnks.forEach(function(l){var el=document.getElementById(l.getAttribute('href').slice(1));if(el&&el.offsetTop<=y)act=l;});
  lnks.forEach(function(l){l.classList.remove('act');});
  if(act)act.classList.add('act');
},{passive:true});
document.addEventListener('keydown',function(e){if(e.key==='Escape')shnClose();});
})();
</script>

<script>
const topics = [
// ═══════════════════════════════════════════════════════════════════
// NETWORK FUNDAMENTALS
// ═══════════════════════════════════════════════════════════════════
{
  id: "network-models",
  title: "OSI & TCP/IP Models",
  cat: "network-fundamentals",
  tag: "Network Fundamentals",
  tagColor: "#00c9ff",
  content: `
<h2 id="osi-tcp-ip-models">OSI & TCP/IP Models</h2>
<span class="topic-tag" style="background:rgba(0,201,255,0.15);color:#00c9ff">Network Fundamentals</span>

<h3 id="osi-model-7-layers">OSI Model — 7 Layers</h3>
<div class="tbl-wrap"><table>
<tr><th>Layer</th><th>#</th><th>PDU</th><th>Key Protocols / Devices</th></tr>
<tr><td><strong>Application</strong></td><td>7</td><td>Data</td><td>HTTP, HTTPS, FTP, SMTP, DNS, DHCP, Telnet, SSH, SNMP</td></tr>
<tr><td><strong>Presentation</strong></td><td>6</td><td>Data</td><td>SSL/TLS, JPEG, MPEG, ASCII, Encryption/Decryption</td></tr>
<tr><td><strong>Session</strong></td><td>5</td><td>Data</td><td>NetBIOS, PPTP, RPC — establishes/maintains/terminates sessions</td></tr>
<tr><td><strong>Transport</strong></td><td>4</td><td>Segment</td><td>TCP, UDP — ports, flow control, error recovery</td></tr>
<tr><td><strong>Network</strong></td><td>3</td><td>Packet</td><td>IP, ICMP, ARP, OSPF — routing, logical addressing</td></tr>
<tr><td><strong>Data Link</strong></td><td>2</td><td>Frame</td><td>Ethernet, Wi-Fi, PPP, STP — MAC addressing, switch</td></tr>
<tr><td><strong>Physical</strong></td><td>1</td><td>Bit</td><td>Cables, hubs, repeaters, NIC — electrical/optical signals</td></tr>
</table></div>
<div class="note"><strong>Mnemonic (Top→Down):</strong> <em>All People Seem To Need Data Processing</em></div>

<h3 id="tcp-ip-model-4-layers">TCP/IP Model (4 Layers)</h3>
<div class="tbl-wrap"><table>
<tr><th>TCP/IP Layer</th><th>Equivalent OSI</th><th>Protocols</th></tr>
<tr><td>Application</td><td>Layers 5, 6, 7</td><td>HTTP, HTTPS, FTP, SMTP, DNS, DHCP, SSH, SNMP, NTP</td></tr>
<tr><td>Transport</td><td>Layer 4</td><td>TCP, UDP</td></tr>
<tr><td>Internet</td><td>Layer 3</td><td>IPv4, IPv6, ICMP, ARP, OSPF, EIGRP, BGP</td></tr>
<tr><td>Network Access</td><td>Layers 1, 2</td><td>Ethernet, Wi-Fi, PPP, Frame Relay</td></tr>
</table></div>

<h3 id="tcp-vs-udp">TCP vs UDP</h3>
<div class="card-grid">
<div class="card">
  <div class="card-title">TCP — Transmission Control Protocol</div>
  <p>Connection-oriented (3-way handshake: SYN → SYN-ACK → ACK). Reliable, ordered, error-checked delivery. Flow control (sliding window). Used by: HTTP/HTTPS, FTP, SMTP, SSH, Telnet.</p>
</div>
<div class="card">
  <div class="card-title">UDP — User Datagram Protocol</div>
  <p>Connectionless. No guaranteed delivery, no ordering, no flow control. Low overhead, fast. Used by: DNS, DHCP, TFTP, VoIP, streaming video, SNMP.</p>
</div>
</div>

<h3 id="well-known-port-numbers">Well-Known Port Numbers</h3>

<h2 id="network-devices">Network Devices</h2>
<span class="topic-tag" style="background:rgba(0,201,255,0.15);color:#00c9ff">Network Fundamentals</span>

<h3 id="layer-1-physical-devices">Layer 1 — Physical Devices</h3>
<ul>
<li><strong>Hub:</strong> Repeats signal to all ports (broadcasts). Creates one collision domain. Legacy; no longer used.</li>
<li><strong>Repeater:</strong> Regenerates signal to extend cable length.</li>

<ul>

<li><strong>Bridge:</strong> Connects two LAN segments at Layer 2. Software-based MAC learning. Predecessor to switch.</li>
<li><strong>Wireless Access Point (AP):</strong> Connects wireless clients to wired network at Layer 2.</li>
</ul>

<h3 id="layer-3-network-devices">Layer 3 — Network Devices</h3>
<ul>
<li><strong>Router:</strong> Routes packets between networks using IP addressing. Separates broadcast domains. Uses routing tables.</li>

<h2 id="ipv6-addressing">IPv6 Addressing</h2>
<span class="topic-tag" style="background:rgba(123,97,255,0.15);color:#7b61ff">IP Addressing</span>

<h3 id="ipv6-overview">IPv6 Overview</h3>
<p>IPv6 uses 128-bit addresses (vs IPv4's 32-bit), providing 3.4 × 10³⁸ addresses. Written as 8 groups of 4 hex digits separated by colons.</p>
<pre>2001:0db8:85a3:0000:0000:8a2e:0370:7334</pre>

<h3 id="ipv6-compression-rules">IPv6 Compression Rules</h3>
<ul>
<li><strong>Rule 1:</strong> Remove leading zeros in each group: <code>0042 → 42</code></li>
<li><strong>Rule 2:</strong> Replace one or more consecutive all-zero groups with <code>::</code> (can only be used once)</li>
</ul>
<pre>2001:0db8:0000:0000:0000:0000:0000:0001
→ 2001:db8::1</pre>

<h3 id="ipv6-address-types">IPv6 Address Types</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Global Unicast (GUA)</div><p>Starts with 2000::/3 (2xxx or 3xxx). Publicly routable, assigned by ISP. Equivalent to IPv4 public addresses.</p></div>
<div class="card"><div class="card-title">Link-Local</div><p>FE80::/10. Automatically assigned on every IPv6 interface. Not routable beyond local link. Required for NDP.</p></div>
<div class="card"><div class="card-title">Unique Local</div><p>FC00::/7 (FD00::/8 in practice). Private addressing, not routable on internet. Similar to RFC 1918.</p></div>
<div class="card"><div class="card-title">Loopback</div><p>::1/128. Equivalent to 127.0.0.1 in IPv4.</p></div>
<div class="card"><div class="card-title">Multicast</div><p>FF00::/8. No broadcast in IPv6; multicast replaces it. FF02::1 = all nodes, FF02::2 = all routers.</p></div>
<div class="card"><div class="card-title">Anycast</div><p>Same address assigned to multiple interfaces. Packet delivered to nearest interface. Used for load balancing.</p></div>
</div>

<h3 id="eui-64-interface-id">EUI-64 Interface ID</h3>
<p>IPv6 can auto-generate the 64-bit interface ID from the MAC address:</p>
<pre>MAC: AA:BB:CC:DD:EE:FF
1. Split in half: AA:BB:CC | DD:EE:FF
2. Insert FF:FE: AA:BB:CC:FF:FE:DD:EE:FF
3. Flip 7th bit of first byte (U/L bit): AA → A8
EUI-64 ID: A8BB:CCFF:FEDD:EEFF</pre>

<h3 id="ipv6-address-configuration">IPv6 Address Configuration</h3>
<div class="tbl-wrap"><table>
<tr><th>Method</th><th>Description</th></tr>
<tr><td>Static</td><td>Manually configured. <code>ipv6 address 2001:db8::1/64</code></td></tr>
<tr><td>SLAAC</td><td>Stateless Address Autoconfiguration. Host gets prefix from RA, creates Interface ID via EUI-64 or random.</td></tr>
<tr><td>DHCPv6 Stateless</td><td>RA provides prefix; DHCPv6 provides DNS/options only.</td></tr>
<tr><td>DHCPv6 Stateful</td><td>DHCPv6 server assigns full address. Similar to DHCPv4.</td></tr>
</table></div>

<h3 id="ndp-neighbor-discovery-protocol">NDP — Neighbor Discovery Protocol</h3>
<p>IPv6 replacement for ARP. Uses ICMPv6 messages:</p>
<ul>
<li><strong>RS (Router Solicitation):</strong> Host requests router info</li>
<li><strong>RA (Router Advertisement):</strong> Router sends prefix, gateway, flags</li>
<li><strong>NS (Neighbor Solicitation):</strong> Like ARP Request — find MAC for IP</li>
<li><strong>NA (Neighbor Advertisement):</strong> Like ARP Reply — sends MAC</li>
<li><strong>Redirect:</strong> Router tells host of better path</li>
</ul>

<h3 id="ipv6-migration-techniques">IPv6 Migration Techniques</h3>
<ul>
<li><strong>Dual Stack:</strong> Run both IPv4 and IPv6 simultaneously on same device</li>
<li><strong>Tunneling:</strong> Encapsulate IPv6 in IPv4 packets (6to4, ISATAP, Teredo)</li>
<li><strong>NAT64/DNS64:</strong> Translates between IPv6 and IPv4</li>
</ul>
`

<h2 id="vlsm-nat">VLSM & NAT</h2>
<span class="topic-tag" style="background:rgba(123,97,255,0.15);color:#7b61ff">IP Addressing</span>

<h3 id="vlsm-variable-length-subnet-masking">VLSM — Variable Length Subnet Masking</h3>
<p>VLSM allows subnets of different sizes within the same address space. Used to efficiently allocate IP addresses.</p>
<div class="note"><strong>Approach:</strong> Always subnet the largest network first, then work down to smallest.</div>

<h4>VLSM Example</h4>
<pre>Given: 192.168.1.0/24
Requirements:
  - Sales:    60 hosts  → needs /26 (62 hosts)
  - IT:       25 hosts  → needs /27 (30 hosts)
  - HR:       10 hosts  → needs /28 (14 hosts)
  - Mgmt:      5 hosts  → needs /29 (6 hosts)
  - Links:     2 hosts  → needs /30 (2 hosts)

Allocation:
  Sales: 192.168.1.0/26   (0–63)
  IT:    192.168.1.64/27  (64–95)
  HR:    192.168.1.96/28  (96–111)
  Mgmt:  192.168.1.112/29 (112–119)
  Link:  192.168.1.120/30 (120–123)</pre>

<h3 id="nat-network-address-translation">NAT — Network Address Translation</h3>
<div class="tbl-wrap"><table>
<tr><th>Type</th><th>Description</th><th>Use Case</th></tr>
<tr><td>Static NAT</td><td>One-to-one mapping between private and public IP</td><td>Servers needing fixed public IP</td></tr>
<tr><td>Dynamic NAT</td><td>Maps private IPs to a pool of public IPs (first-come basis)</td><td>Pool of public IPs available</td></tr>
<tr><td>PAT / NAT Overload</td><td>Many private IPs map to one public IP using different ports</td><td>Home/small office (most common)</td></tr>
</table></div>

<h4>NAT Terminology</h4>
<ul>
<li><strong>Inside Local:</strong> Private IP of inside host (as seen inside)</li>
<li><strong>Inside Global:</strong> Public IP representing inside host (as seen outside)</li>
<li><strong>Outside Local:</strong> IP of outside host as seen from inside</li>
<li><strong>Outside Global:</strong> Real IP of outside host</li>
</ul>

<h4>NAT Configuration (IOS)</h4>
<pre>! Static NAT
ip nat inside source static 192.168.1.10 203.0.113.10

! Dynamic NAT with Pool
ip nat pool MYPOOL 203.0.113.1 203.0.113.5 netmask 255.255.255.248
access-list 1 permit 192.168.1.0 0.0.0.255
ip nat inside source list 1 pool MYPOOL

! PAT (Overload)
ip nat inside source list 1 interface GigabitEthernet0/0 overload

! Interface designations
interface GigabitEthernet0/0
 ip nat outside
interface GigabitEthernet0/1
 ip nat inside</pre>
<pre>! Verify
show ip nat translations
show ip nat statistics</pre>
`
},

<h2 id="ethernet-switching">Ethernet & Switching</h2>
<span class="topic-tag" style="background:rgba(0,229,160,0.15);color:#00e5a0">Switching</span>

<h3 id="ethernet-frame-structure">Ethernet Frame Structure</h3>
<div class="tbl-wrap"><table>
<tr><th>Field</th><th>Size</th><th>Description</th></tr>
<tr><td>Preamble</td><td>7 bytes</td><td>Synchronization pattern (101010…)</td></tr>
<tr><td>SFD</td><td>1 byte</td><td>Start Frame Delimiter (10101011)</td></tr>
<tr><td>Destination MAC</td><td>6 bytes</td><td>Target MAC address</td></tr>
<tr><td>Source MAC</td><td>6 bytes</td><td>Sender MAC address</td></tr>
<tr><td>Type/Length</td><td>2 bytes</td><td>&gt;1500 = EtherType, ≤1500 = length</td></tr>
<tr><td>Data/Payload</td><td>46–1500 bytes</td><td>Upper layer data (+ padding if needed)</td></tr>
<tr><td>FCS</td><td>4 bytes</td><td>Frame Check Sequence (CRC error detection)</td></tr>
</table></div>

<h3 id="mac-address">MAC Address</h3>
<p>48-bit (6-byte) address burned into NIC. Written as hex: <code>AA:BB:CC:DD:EE:FF</code></p>
<ul>
<li>First 24 bits = OUI (Organizationally Unique Identifier) — identifies manufacturer</li>
<li>Last 24 bits = Device-specific serial number</li>
<li>Bit 1 of first byte: 0=unicast, 1=multicast</li>
<li>Bit 2 of first byte: 0=globally unique (burned-in), 1=locally administered</li>
</ul>

<h3 id="switch-operation">Switch Operation</h3>
<p>Switches use the <strong>MAC address table</strong> (CAM table) to make forwarding decisions:</p>
<ol>
<li><strong>Learning:</strong> When a frame arrives, the switch records the source MAC → port mapping</li>
<li><strong>Forwarding:</strong> If destination MAC is known, forward to that port only (unicast)</li>
<li><strong>Flooding:</strong> If destination unknown, send out all ports except source (unknown unicast flood)</li>
<li><strong>Filtering:</strong> Don't send frame back out the same port it came from</li>
</ol>

<h3 id="switch-frame-processing-modes">Switch Frame Processing Modes</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Store-and-Forward</div><p>Receives entire frame, checks FCS for errors, then forwards. Higher latency, error-free forwarding. Default on most Cisco switches.</p></div>
<div class="card"><div class="card-title">Cut-Through</div><p>Begins forwarding after reading destination MAC (first 6 bytes). Lower latency but can forward corrupt frames.</p></div>
<div class="card"><div class="card-title">Fragment-Free</div><p>Waits for first 64 bytes (min Ethernet frame size to avoid collision fragments) then forwards. Compromise between the two.</p></div>
</div>

<h3 id="switch-ios-basic-configuration">Switch IOS — Basic Configuration</h3>
<pre>! Initial setup
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW1
SW1(config)# enable secret cisco123
SW1(config)# service password-encryption
SW1(config)# banner motd # Authorized Access Only #

! Management VLAN interface
SW1(config)# interface vlan 1
SW1(config-if)# ip address 192.168.1.2 255.255.255.0
SW1(config-if)# no shutdown

! Default gateway
SW1(config)# ip default-gateway 192.168.1.1

! Console & VTY lines
SW1(config)# line console 0
SW1(config-line)# password cisco
SW1(config-line)# login
SW1(config)# line vty 0 15
SW1(config-line)# password cisco
SW1(config-line)# login
SW1(config-line)# transport input ssh

! Save
SW1# copy running-config startup-config</pre>

<h3 id="useful-show-commands">Useful Show Commands</h3>
<pre>show mac address-table        ! MAC table
show mac address-table dynamic ! Dynamic entries only
show interfaces status         ! Port status
show interfaces gi0/1          ! Detailed interface info
show running-config
show version</pre>
`

<h2 id="vlans-trunking">VLANs & Trunking</h2>
<span class="topic-tag" style="background:rgba(0,229,160,0.15);color:#00e5a0">Switching</span>

<h3 id="vlan-concepts">VLAN Concepts</h3>
<p>VLANs (Virtual LANs) segment a physical network into multiple logical broadcast domains at Layer 2.</p>
<ul>
<li>Each VLAN is a separate broadcast domain</li>
<li>Traffic between VLANs requires Layer 3 routing</li>
<li>VLANs 1–4094 are valid (1 is default, 1002–1005 reserved for legacy)</li>
<li>Normal range: 1–1005 | Extended range: 1006–4094</li>
</ul>

<h3 id="vlan-configuration">VLAN Configuration</h3>
<pre>! Create VLANs
SW1(config)# vlan 10
SW1(config-vlan)# name SALES
SW1(config)# vlan 20
SW1(config-vlan)# name IT
SW1(config)# vlan 30
SW1(config-vlan)# name MGMT

! Access port (end device)
SW1(config)# interface gi0/1
SW1(config-if)# switchport mode access
SW1(config-if)# switchport access vlan 10

! Voice VLAN on access port
SW1(config-if)# switchport voice vlan 99

! Verify
SW1# show vlan brief
SW1# show interfaces gi0/1 switchport</pre>

<h3 id="trunk-ports-802-1q">Trunk Ports & 802.1Q</h3>
<p>Trunk links carry traffic for multiple VLANs between switches (or switch to router). <strong>IEEE 802.1Q</strong> adds a 4-byte tag to Ethernet frames:</p>
<pre>802.1Q Tag (4 bytes):
  - TPID: 0x8100 (2 bytes) — identifies as 802.1Q
  - PCP:  3 bits  — priority (CoS)
  - DEI:  1 bit   — drop eligible
  - VID:  12 bits — VLAN ID (0–4095)</pre>

<pre>! Trunk port configuration
SW1(config)# interface gi0/24
SW1(config-if)# switchport mode trunk
SW1(config-if)# switchport trunk encapsulation dot1q  ! Required on some switches
SW1(config-if)# switchport trunk allowed vlan 10,20,30
SW1(config-if)# switchport trunk native vlan 99      ! Native VLAN (untagged)

! Verify
SW1# show interfaces trunk
SW1# show interfaces gi0/24 switchport</pre>

<div class="warn"><strong>Native VLAN:</strong> Traffic on the native VLAN is sent untagged over a trunk. Both ends must agree on native VLAN. VLAN hopping attack can exploit native VLAN mismatches. Best practice: set native VLAN to unused VLAN.</div>

<h3 id="dtp-dynamic-trunking-protocol">DTP — Dynamic Trunking Protocol</h3>
<div class="tbl-wrap"><table>
<tr><th>Mode</th><th>Description</th></tr>
<tr><td>dynamic auto</td><td>Becomes trunk if other side initiates. Does NOT initiate.</td></tr>
<tr><td>dynamic desirable</td><td>Actively tries to become trunk. Initiates negotiation.</td></tr>
<tr><td>trunk</td><td>Always trunk, sends DTP.</td></tr>
<tr><td>access</td><td>Always access, sends DTP to disable trunk.</td></tr>
<tr><td>nonegotiate</td><td>Static trunk/access, no DTP sent.</td></tr>
</table></div>
<pre>SW1(config-if)# switchport nonegotiate  ! Disable DTP (security best practice)</pre>

<h3 id="vtp-vlan-trunking-protocol">VTP — VLAN Trunking Protocol</h3>
<p>Cisco proprietary. Propagates VLAN database changes across trunk links.</p>
<div class="tbl-wrap"><table>
<tr><th>Mode</th><th>Create VLANs</th><th>Sync</th><th>Forward</th></tr>
<tr><td>Server</td><td>Yes</td><td>Yes</td><td>Yes</td></tr>
<tr><td>Client</td><td>No</td><td>Yes</td><td>Yes</td></tr>
<tr><td>Transparent</td><td>Yes (local only)</td><td>No</td><td>Yes</td></tr>
<tr><td>Off (VTPv3)</td><td>Yes (local)</td><td>No</td><td>No</td></tr>
</table></div>
<div class="danger-box"><strong>VTP Danger:</strong> A switch with higher revision number connecting to your network can wipe all VLANs! Always reset revision number before adding a switch (change domain name twice).</div>
<pre>SW1# show vtp status
SW1(config)# vtp mode transparent
SW1(config)# vtp domain COMPANY
SW1(config)# vtp password cisco123</pre>

<h3 id="inter-vlan-routing">Inter-VLAN Routing</h3>
<h4>Method 1: Router-on-a-Stick</h4>
<pre>! Router subinterfaces
R1(config)# interface gi0/0.10
R1(config-subif)# encapsulation dot1q 10
R1(config-subif)# ip address 192.168.10.1 255.255.255.0
R1(config)# interface gi0/0.20
R1(config-subif)# encapsulation dot1q 20
R1(config-subif)# ip address 192.168.20.1 255.255.255.0
R1(config)# interface gi0/0
R1(config-if)# no shutdown</pre>

<h4>Method 2: Layer 3 Switch (SVIs)</h4>
<pre>! Switch Virtual Interfaces
SW1(config)# ip routing              ! Enable L3 routing
SW1(config)# interface vlan 10
SW1(config-if)# ip address 192.168.10.1 255.255.255.0
SW1(config-if)# no shutdown
SW1(config)# interface vlan 20
SW1(config-if)# ip address 192.168.20.1 255.255.255.0
SW1(config-if)# no shutdown</pre>
`

<h2 id="spanning-tree-protocol-stp">Spanning Tree Protocol (STP)</h2>
<span class="topic-tag" style="background:rgba(0,229,160,0.15);color:#00e5a0">Switching</span>

<h3 id="why-stp">Why STP?</h3>
<p>Without STP, redundant switch links cause <strong>broadcast storms</strong> (frames loop forever), <strong>MAC table instability</strong>, and <strong>duplicate frame delivery</strong>. STP prevents loops by blocking redundant paths.</p>

<h3 id="stp-election-process">STP Election Process</h3>
<ol>
<li><strong>Elect Root Bridge:</strong> Switch with lowest Bridge ID = Root Bridge. BID = Priority (16-bit, default 32768) + MAC address. All ports on root bridge are Designated Ports (forwarding).</li>
<li><strong>Elect Root Ports:</strong> Each non-root switch selects one Root Port — the port with lowest cost path to root bridge.</li>
<li><strong>Elect Designated Ports:</strong> Each segment has one Designated Port — the port closest to root on that segment.</li>
<li><strong>Block remaining:</strong> All other ports become Alternate/Backup (blocking).</li>
</ol>

<h3 id="stp-port-costs">STP Port Costs</h3>
<div class="tbl-wrap"><table>
<tr><th>Speed</th><th>STP Cost (802.1D)</th><th>RSTP Cost (802.1w)</th></tr>
<tr><td>10 Mbps</td><td>100</td><td>2,000,000</td></tr>
<tr><td>100 Mbps</td><td>19</td><td>200,000</td></tr>
<tr><td>1 Gbps</td><td>4</td><td>20,000</td></tr>
<tr><td>10 Gbps</td><td>2</td><td>2,000</td></tr>
</table></div>

<h3 id="stp-port-states">STP Port States</h3>
<div class="tbl-wrap"><table>
<tr><th>State</th><th>Forward Frames</th><th>Learn MACs</th><th>Duration</th></tr>
<tr><td>Blocking</td><td>No</td><td>No</td><td>Max Age: 20s</td></tr>
<tr><td>Listening</td><td>No</td><td>No</td><td>Forward Delay: 15s</td></tr>
<tr><td>Learning</td><td>No</td><td>Yes</td><td>Forward Delay: 15s</td></tr>
<tr><td>Forwarding</td><td>Yes</td><td>Yes</td><td>Normal operation</td></tr>
<tr><td>Disabled</td><td>No</td><td>No</td><td>Admin disabled</td></tr>
</table></div>
<p>Total convergence time for classic 802.1D STP: up to <strong>50 seconds</strong>.</p>

<h3 id="stp-variants">STP Variants</h3>
<div class="tbl-wrap"><table>
<tr><th>Protocol</th><th>Standard</th><th>Convergence</th><th>VLAN Support</th></tr>
<tr><td>STP</td><td>802.1D</td><td>~50 sec</td><td>Common tree (all VLANs)</td></tr>
<tr><td>PVST+</td><td>Cisco</td><td>~50 sec</td><td>Per-VLAN tree</td></tr>
<tr><td>RSTP</td><td>802.1w</td><td>~1-2 sec</td><td>Common tree</td></tr>
<tr><td>Rapid PVST+</td><td>Cisco</td><td>~1-2 sec</td><td>Per-VLAN tree</td></tr>
<tr><td>MST/MSTP</td><td>802.1s</td><td>~1-2 sec</td><td>Multiple VLANs per instance</td></tr>
</table></div>

<h3 id="stp-configuration">STP Configuration</h3>
<pre>! Set switch as root bridge
SW1(config)# spanning-tree vlan 10 priority 4096  ! Lower = preferred root
SW1(config)# spanning-tree vlan 10 root primary   ! Shortcut — sets to 24576

! Enable Rapid PVST+
SW1(config)# spanning-tree mode rapid-pvst

! PortFast — skip listening/learning for access ports
SW1(config-if)# spanning-tree portfast

! BPDU Guard — disable port if BPDU received (protect PortFast ports)
SW1(config-if)# spanning-tree bpduguard enable
SW1(config)# spanning-tree portfast bpduguard default  ! Enable globally

! Root Guard — prevent port from becoming root port
SW1(config-if)# spanning-tree guard root

! Verify
SW1# show spanning-tree
SW1# show spanning-tree vlan 10
SW1# show spanning-tree summary</pre>

<h3 id="stp-protection-features">STP Protection Features</h3>
<div class="card-grid">
<div class="card"><div class="card-title">PortFast</div><p>Immediately moves access port to forwarding state. Use ONLY on access ports connected to end devices (not switches). Prevents 30-second delay on PC startup.</p></div>
<div class="card"><div class="card-title">BPDU Guard</div><p>If a PortFast port receives a BPDU, the port is put into err-disabled state. Protects against unauthorized switch connections.</p></div>
<div class="card"><div class="card-title">Root Guard</div><p>Prevents designated port from becoming root port. Placed on ports facing access switches. Enforces root bridge placement.</p></div>
<div class="card"><div class="card-title">Loop Guard</div><p>Prevents alternate/backup ports from becoming designated if BPDUs stop. Protects against unidirectional link failures.</p></div>
</div>
`
},

<h2 id="etherchannel">EtherChannel</h2>
<span class="topic-tag" style="background:rgba(0,229,160,0.15);color:#00e5a0">Switching</span>

<h3 id="etherchannel-overview">EtherChannel Overview</h3>
<p>EtherChannel bundles multiple physical links into one logical link, providing increased bandwidth and redundancy without STP blocking.</p>
<ul>
<li>Up to 8 active links (16 in 802.3ad — 8 active, 8 standby)</li>
<li>STP sees it as one link — no blocking!</li>
<li>Load balancing across member links</li>
<li>If one link fails, traffic continues on remaining links</li>
</ul>

<h3 id="etherchannel-protocols">EtherChannel Protocols</h3>
<div class="card-grid">
<div class="card"><div class="card-title">PAgP — Port Aggregation Protocol</div><p>Cisco proprietary. Modes: <strong>Desirable</strong> (actively negotiates), <strong>Auto</strong> (responds to negotiation, doesn't initiate). Auto + Auto = No EtherChannel!</p></div>
<div class="card"><div class="card-title">LACP — Link Aggregation Control Protocol</div><p>IEEE 802.3ad standard. Modes: <strong>Active</strong> (actively negotiates), <strong>Passive</strong> (responds, doesn't initiate). Passive + Passive = No EtherChannel!</p></div>
<div class="card"><div class="card-title">Static (On)</div><p>No negotiation protocol. Both sides set to "on". No PAgP or LACP packets sent. Simple but no error checking.</p></div>
</div>

<h3 id="etherchannel-requirements">EtherChannel Requirements</h3>
<ul>
<li>Same speed and duplex on all member ports</li>
<li>Same access VLAN or trunk configuration</li>
<li>Same native VLAN and allowed VLANs (trunk)</li>
<li>Same STP configuration</li>
</ul>

<h3 id="etherchannel-configuration">EtherChannel Configuration</h3>
<pre>! LACP EtherChannel
SW1(config)# interface range gi0/1-4
SW1(config-if-range)# channel-group 1 mode active
SW1(config)# interface port-channel 1
SW1(config-if)# switchport mode trunk    ! Configure the port-channel

! PAgP EtherChannel

SW1(config-if-range)# channel-group 1 mode desirable

! Static EtherChannel
SW1(config)# interface range gi0/1-4
SW1(config-if-range)# channel-group 1 mode on

! Verify
SW1# show etherchannel summary
SW1# show etherchannel port-channel
SW1# show interfaces port-channel 1</pre>

<h3 id="load-balancing-methods">Load Balancing Methods</h3>
<pre>SW1(config)# port-channel load-balance ?
  dst-ip      Dst IP Addr
  dst-mac     Dst Mac Addr
  src-dst-ip  Src XOR Dst IP Addr
  src-dst-mac Src XOR Dst Mac Addr
  src-ip      Src IP Addr

SW1# show etherchannel load-balance</pre>

<h2 id="routing-fundamentals">Routing Fundamentals</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="routing-process">Routing Process</h3>
<p>A router examines the destination IP address of an incoming packet, consults its routing table, and forwards the packet out the appropriate interface.</p>

<h3 id="routing-table">Routing Table</h3>
<pre>R1# show ip route
Codes: C - connected, S - static, R - RIP, O - OSPF, D - EIGRP, 
       B - BGP, i - IS-IS, * - candidate default

Gateway of last resort is 10.0.0.1 to network 0.0.0.0

C    192.168.1.0/24 is directly connected, GigabitEthernet0/0
L    192.168.1.1/32 is directly connected, GigabitEthernet0/0
O    10.0.0.0/8 [110/2] via 192.168.1.2, 00:01:23, GigabitEthernet0/0
S    0.0.0.0/0 [1/0] via 10.0.0.1</pre>
<p>Format: <code>[Administrative Distance/Metric]</code></p>

<h3 id="administrative-distance-ad">Administrative Distance (AD)</h3>
<div class="tbl-wrap"><table>
<tr><th>Routing Source</th><th>AD</th></tr>
<tr><td>Connected</td><td>0</td></tr>
<tr><td>Static</td><td>1</td></tr>
<tr><td>EIGRP Summary</td><td>5</td></tr>
<tr><td>External BGP</td><td>20</td></tr>
<tr><td>Internal EIGRP</td><td>90</td></tr>
<tr><td>IGRP</td><td>100</td></tr>
<tr><td>OSPF</td><td>110</td></tr>
<tr><td>IS-IS</td><td>115</td></tr>
<tr><td>RIP</td><td>120</td></tr>
<tr><td>External EIGRP</td><td>170</td></tr>
<tr><td>Internal BGP</td><td>200</td></tr>
<tr><td>Unknown / Unreachable</td><td>255</td></tr>
</table></div>
<div class="note"><strong>Lower AD = more trusted.</strong> If two routing protocols have routes to same destination, lowest AD wins.</div>

<h3 id="router-ios-basic-configuration">Router IOS — Basic Configuration</h3>
<pre>R1(config)# interface gi0/0
R1(config-if)# ip address 192.168.1.1 255.255.255.0
R1(config-if)# description Link to SW1
R1(config-if)# no shutdown

! Serial interface
R1(config)# interface serial0/0/0
R1(config-if)# ip address 10.0.0.1 255.255.255.252
R1(config-if)# clock rate 64000    ! DCE end only
R1(config-if)# no shutdown

! Loopback interface

R1(config-if)# ip address 1.1.1.1 255.255.255.255</pre>

<h3 id="static-routing">Static Routing</h3>
<pre>! Standard static route
R1(config)# ip route 192.168.2.0 255.255.255.0 10.0.0.2
R1(config)# ip route 192.168.2.0 255.255.255.0 gi0/1  ! Exit interface

R1(config)# ip route 0.0.0.0 0.0.0.0 gi0/0 10.0.0.1  ! Fully specified (best)

! Floating static (backup route — higher AD than dynamic)
R1(config)# ip route 192.168.2.0 255.255.255.0 10.0.1.2 200

! Summary static route

! IPv6 static

  content: `
<h2 id="ospf-open-shortest-path-first">OSPF — Open Shortest Path First</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="ospf-key-concepts">OSPF Key Concepts</h3>
<ul>
<li><strong>Link-State:</strong> Builds a complete topology map of the network using LSAs</li>
<li><strong>Algorithm:</strong> Dijkstra's Shortest Path First (SPF)</li>
<li><strong>Metric:</strong> Cost = 100 Mbps ÷ interface bandwidth</li>
<li><strong>AD:</strong> 110</li>
<li><strong>Multicast:</strong> 224.0.0.5 (all OSPF routers), 224.0.0.6 (DR/BDR)</li>
<li><strong>Protocol:</strong> IP Protocol 89</li>
<li><strong>Standard:</strong> OSPFv2 (IPv4), OSPFv3 (IPv6)</li>
</ul>

<h3 id="ospf-neighbor-states">OSPF Neighbor States</h3>
<p>OSPF forms adjacencies through a state machine:</p>
<pre>Down → Init → 2-Way → ExStart → Exchange → Loading → Full</pre>
<ul>
<li><strong>2-Way:</strong> Bidirectional communication. DR/BDR election happens here.</li>
<li><strong>Full:</strong> Complete adjacency. LSDBs are synchronized.</li>
</ul>

<h3 id="dr-bdr-election-multi-access-networks">DR/BDR Election (Multi-Access Networks)</h3>
<p>On broadcast networks (Ethernet), OSPF elects a Designated Router (DR) and Backup DR (BDR) to reduce OSPF traffic.</p>
<ul>
<li>Highest OSPF priority wins (default: 1). Priority 0 = never elected.</li>
<li>Tie: Highest Router ID wins</li>
<li>Router ID = Highest loopback IP, then highest active interface IP, or manually configured</li>
<li>DR/BDR election is <strong>non-preemptive</strong> once formed</li>
</ul>

<h3 id="ospf-areas">OSPF Areas</h3>
<ul>
<li><strong>Backbone Area (Area 0):</strong> All other areas must connect to Area 0</li>
<li><strong>ABR (Area Border Router):</strong> Connects non-backbone area to Area 0</li>
<li><strong>ASBR (Autonomous System Boundary Router):</strong> Connects OSPF to external routing domain</li>
<li><strong>Stub Area:</strong> No external LSAs. Default route used instead.</li>
<li><strong>Totally Stubby:</strong> No external or inter-area LSAs. Only default route. (Cisco)</li>
<li><strong>NSSA:</strong> Not-So-Stubby. Allows limited external routes (Type 7 LSA).</li>
</ul>

<h3 id="ospf-configuration-single-area">OSPF Configuration (Single Area)</h3>
<pre>! OSPFv2
R1(config)# router ospf 1
R1(config-router)# router-id 1.1.1.1
R1(config-router)# network 192.168.1.0 0.0.0.255 area 0
R1(config-router)# network 10.0.0.0 0.0.0.3 area 0
R1(config-router)# passive-interface gi0/1  ! No OSPF hellos on this interface
R1(config-router)# default-information originate  ! Advertise default route

! Interface cost
R1(config-if)# ip ospf cost 10

! Priority for DR election
R1(config-if)# ip ospf priority 100  ! 0 = won't be elected

! Hello/Dead timers
R1(config-if)# ip ospf hello-interval 10
R1(config-if)# ip ospf dead-interval 40</pre>

<h3 id="ospf-verification">OSPF Verification</h3>
<pre>show ip ospf neighbor            ! Adjacency table
show ip ospf neighbor detail     ! Detailed neighbor info
show ip ospf database            ! LSDB
show ip ospf interface           ! OSPF interface info
show ip route ospf               ! OSPF routes in routing table
debug ip ospf events
debug ip ospf adj</pre>

<h3 id="ospfv3-ipv6">OSPFv3 (IPv6)</h3>
<pre>R1(config)# ipv6 router ospf 1
R1(config-rtr)# router-id 1.1.1.1
R1(config)# interface gi0/0
R1(config-if)# ipv6 ospf 1 area 0</pre>

<h3 id="ospf-cost-calculation">OSPF Cost Calculation</h3>
<pre>Cost = Reference Bandwidth / Interface Bandwidth
Default reference = 100 Mbps

FastEthernet (100M): 100/100 = 1
GigabitEthernet (1G): 100/1000 = 0.1 → rounds to 1 (same as FE!)

! Fix: increase reference bandwidth
R1(config-router)# auto-cost reference-bandwidth 1000  ! = 1 Gbps
R1(config-router)# auto-cost reference-bandwidth 10000 ! = 10 Gbps</pre>
`
},

<h2 id="eigrp-enhanced-interior-gateway-routing-">EIGRP — Enhanced Interior Gateway Routing Protocol</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="eigrp-characteristics">EIGRP Characteristics</h3>
<ul>
<li><strong>Type:</strong> Advanced Distance Vector / Hybrid (uses Diffusing Update Algorithm — DUAL)</li>
<li><strong>Cisco proprietary</strong> (now has RFC 7868 open standard)</li>
<li><strong>AD:</strong> Internal 90, External 170, Summary 5</li>
<li><strong>Metric:</strong> Composite — Bandwidth + Delay (+ Reliability + Load + MTU optionally)</li>
<li><strong>Multicast:</strong> 224.0.0.10</li>
<li><strong>Protocol:</strong> IP Protocol 88</li>
<li><strong>100% loop-free</strong> due to DUAL algorithm</li>
</ul>

<h3 id="eigrp-dual-terminology">EIGRP DUAL Terminology</h3>
<ul>
<li><strong>Feasible Distance (FD):</strong> Best metric to reach destination (from this router)</li>
<li><strong>Reported Distance (RD) / Advertised Distance:</strong> Neighbor's metric to destination</li>
<li><strong>Successor:</strong> Best path to destination. Installed in routing table.</li>
<li><strong>Feasible Successor (FS):</strong> Backup path. RD &lt; Successor's FD. Immediately usable if successor fails.</li>
<li><strong>Feasibility Condition:</strong> RD of neighbor must be less than FD of current successor</li>
</ul>

<h3 id="eigrp-configuration">EIGRP Configuration</h3>
<pre>! Classic mode
R1(config)# router eigrp 100         ! AS number must match
R1(config-router)# eigrp router-id 1.1.1.1
R1(config-router)# network 192.168.1.0
R1(config-router)# network 10.0.0.0 0.0.0.3  ! With wildcard mask
R1(config-router)# passive-interface gi0/1
R1(config-router)# no auto-summary   ! Disable automatic summarization

! Named mode (preferred — supports IPv4 and IPv6)
R1(config)# router eigrp CORP
R1(config-router)# address-family ipv4 unicast autonomous-system 100
R1(config-router-af)# eigrp router-id 1.1.1.1
R1(config-router-af)# network 192.168.1.0
R1(config-router-af)# af-interface gi0/0
R1(config-router-af-interface)# passive-interface</pre>

<h3 id="eigrp-verification">EIGRP Verification</h3>
<pre>show ip eigrp neighbors          ! Neighbor table
show ip eigrp topology           ! Topology table (successors + FS)
show ip eigrp topology all-links ! All paths
show ip route eigrp              ! EIGRP routes
show ip eigrp interfaces         ! Interfaces running EIGRP
show ip eigrp traffic            ! Packet statistics</pre>

<h3 id="eigrp-metric-calculation">EIGRP Metric Calculation</h3>
<pre>Metric = 256 × [(K1 × BW) + (K3 × Delay)]
  Default K values: K1=1, K2=0, K3=1, K4=0, K5=0

BW    = 10^7 / slowest link bandwidth (in kbps)
Delay = sum of delays along path (in 10 microsecond units)

Example: 100 Mbps link, delay 1000 μs:
  BW    = 10^7 / 100000 = 100
  Delay = 1000/10 = 100
  Metric = 256 × (100 + 100) = 51200</pre>
`
},

<h2 id="rip-routing-information-protocol">RIP — Routing Information Protocol</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="rip-characteristics">RIP Characteristics</h3>
<ul>
<li><strong>Type:</strong> Distance Vector</li>
<li><strong>Metric:</strong> Hop count (max 15; 16 = infinite = unreachable)</li>
<li><strong>AD:</strong> 120</li>
<li><strong>Updates:</strong> Full routing table broadcast/multicast every 30 seconds</li>
<li><strong>RIPv1:</strong> Classful, broadcast (255.255.255.255), no VLSM</li>
<li><strong>RIPv2:</strong> Classless, multicast (224.0.0.9), supports VLSM, authentication</li>
<li><strong>RIPng:</strong> RIPv2 for IPv6</li>
</ul>

<h3 id="rip-loop-prevention">RIP Loop Prevention</h3>
<ul>
<li><strong>Maximum hop count (15):</strong> Limits network size</li>
<li><strong>Split horizon:</strong> Don't advertise routes back to source interface</li>
<li><strong>Route poisoning:</strong> Advertise dead route with metric 16</li>
<li><strong>Poison reverse:</strong> Send poisoned route back to source</li>
<li><strong>Holddown timers:</strong> Ignore updates about dead route for 180 sec</li>
</ul>

<h3 id="rip-configuration">RIP Configuration</h3>
<pre>R1(config)# router rip
R1(config-router)# version 2
R1(config-router)# no auto-summary    ! Required for VLSM support
R1(config-router)# network 192.168.1.0
R1(config-router)# network 10.0.0.0
R1(config-router)# passive-interface gi0/1
R1(config-router)# default-information originate

! Verify
R1# show ip rip database
R1# show ip protocols
R1# debug ip rip</pre>

<h2 id="bgp-border-gateway-protocol">BGP — Border Gateway Protocol</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="bgp-overview">BGP Overview</h3>
<p>BGP is the routing protocol of the internet — an Exterior Gateway Protocol (EGP) used between Autonomous Systems (AS).</p>
<ul>
<li><strong>Type:</strong> Path Vector (uses AS-PATH attribute for loop prevention)</li>
<li><strong>Transport:</strong> TCP port 179</li>
<li><strong>AD:</strong> eBGP = 20, iBGP = 200</li>
<li><strong>iBGP:</strong> BGP between routers in same AS</li>
<li><strong>eBGP:</strong> BGP between routers in different AS</li>
</ul>

<h3 id="bgp-attributes-path-selection">BGP Attributes (Path Selection)</h3>
<div class="note">BGP selects best path using attributes in order — remember: <strong>We Love Oranges AS Oranges Mean Pure Refreshment</strong></div>
<ol>
<li><strong>Weight</strong> (Cisco-specific, local to router) — higher preferred</li>
<li><strong>Local Preference</strong> (local to AS) — higher preferred</li>
<li><strong>Originate</strong> (locally originated) — prefer</li>
<li><strong>AS-PATH length</strong> — shorter preferred</li>
<li><strong>Origin</strong> (IGP &gt; EGP &gt; Incomplete)</li>
<li><strong>MED</strong> (Multi-Exit Discriminator) — lower preferred</li>
<li><strong>Paths</strong> (eBGP over iBGP)</li>
<li><strong>IGP metric</strong> — lower preferred</li>
</ol>

<h3 id="basic-bgp-configuration">Basic BGP Configuration</h3>
<pre>! eBGP
R1(config)# router bgp 65001
R1(config-router)# bgp router-id 1.1.1.1
R1(config-router)# neighbor 203.0.113.2 remote-as 65002  ! eBGP neighbor
R1(config-router)# network 192.168.1.0 mask 255.255.255.0

! iBGP
R1(config-router)# neighbor 10.0.0.2 remote-as 65001
R1(config-router)# neighbor 10.0.0.2 update-source Loopback0
R1(config-router)# neighbor 10.0.0.2 next-hop-self

! Verify
R1# show bgp summary
R1# show ip bgp
R1# show bgp neighbors</pre>
`
},

<h2 id="wan-technologies">WAN Technologies</h2>
<span class="topic-tag" style="background:rgba(255,79,109,0.15);color:#ff4f6d">WAN & Services</span>

<h3 id="wan-connection-types">WAN Connection Types</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Leased Lines (Point-to-Point)</div><p>Dedicated serial connection between two sites. T1 (1.544 Mbps), T3 (44.7 Mbps), E1 (2.048 Mbps). Always-on. PPP or HDLC encapsulation. Expensive.</p></div>
<div class="card"><div class="card-title">Frame Relay (Legacy)</div><p>Packet-switched. Virtual circuits (PVC/SVC). DLCI numbers identify VCs. Uses Local Management Interface (LMI). Being replaced by MPLS.</p></div>
<div class="card"><div class="card-title">MPLS</div><p>Multi-Protocol Label Switching. Labels instead of IPs for fast forwarding. Provider-managed. MPLS VPN = private WAN. Most common enterprise WAN today.</p></div>
<div class="card"><div class="card-title">Metro Ethernet</div><p>Ethernet-based WAN. Uses Ethernet standards across MAN/WAN. E-Line (P2P), E-LAN (multipoint), E-Tree (hub-and-spoke). Cost-effective.</p></div>
<div class="card"><div class="card-title">DSL</div><p>Digital Subscriber Line over telephone lines. ADSL (asymmetric), VDSL (faster). PPPoE encapsulation. Distance-limited.</p></div>
<div class="card"><div class="card-title">Cable</div><p>HFC (Hybrid Fiber-Coax). DOCSIS standard. Shared bandwidth. High speeds, asymmetric.</p></div>
</div>

<h3 id="wan-serial-encapsulations">WAN Serial Encapsulations</h3>
<div class="tbl-wrap"><table>
<tr><th>Protocol</th><th>Description</th><th>Notes</th></tr>
<tr><td>HDLC</td><td>High-Level Data Link Control</td><td>Cisco default for serial. Cisco-proprietary version. Point-to-point only.</td></tr>
<tr><td>PPP</td><td>Point-to-Point Protocol</td><td>Open standard. Authentication (PAP, CHAP). Multilink support. More features than HDLC.</td></tr>
<tr><td>PPPoE</td><td>PPP over Ethernet</td><td>Used for DSL connections. Authentication + IP assignment via PPP over Ethernet.</td></tr>
</table></div>

<h3 id="ppp-configuration">PPP Configuration</h3>
<pre>! PPP with CHAP authentication
R1(config)# interface serial0/0/0
R1(config-if)# encapsulation ppp
R1(config-if)# ppp authentication chap

R1(config)# username R2 password cisco123  ! Remote router's hostname

! Verify
R1# show interfaces serial0/0/0
R1# debug ppp authentication</pre>

<h3 id="vpn-types">VPN Types</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Site-to-Site VPN</div><p>Permanent encrypted tunnel between two networks. Uses IPsec. Gateway-to-gateway. Replaces leased lines. Employees don't notice VPN.</p></div>
<div class="card"><div class="card-title">Remote Access VPN</div><p>Individual users connect to corporate network. SSL/TLS or IPsec. AnyConnect, OpenVPN, WireGuard. Users install VPN client.</p></div>
<div class="card"><div class="card-title">GRE Tunnel</div><p>Generic Routing Encapsulation. Encapsulates any protocol. Not encrypted by default. Often combined with IPsec for security. Multipoint GRE (mGRE) for hub-and-spoke.</p></div>
<div class="card"><div class="card-title">DMVPN</div><p>Dynamic Multipoint VPN. Hub-and-spoke + dynamic spoke-to-spoke tunnels. NHRP + mGRE. Scalable enterprise WAN.</p></div>
</div>

<h3 id="sd-wan">SD-WAN</h3>
<p>Software-Defined WAN abstracts the WAN transport layer from the application layer. Benefits:</p>
<ul>
<li>Centralized management and visibility</li>
<li>Multiple transport links (MPLS + broadband + LTE) simultaneously</li>
<li>Application-aware routing</li>
<li>Zero-touch provisioning</li>
<li>Vendors: Cisco Viptela, VMware SD-WAN (VeloCloud), Silver Peak</li>
</ul>
`
},

<h2 id="dhcp-dns">DHCP & DNS</h2>
<span class="topic-tag" style="background:rgba(255,79,109,0.15);color:#ff4f6d">WAN & Services</span>

<h3 id="dhcp-dynamic-host-configuration-protocol">DHCP — Dynamic Host Configuration Protocol</h3>
<p>Automatically assigns IP addresses and configuration to network devices.</p>

<h4>DHCP DORA Process</h4>
<pre>1. DISCOVER  — Client broadcasts (255.255.255.255) looking for DHCP server
2. OFFER     — Server unicasts/broadcasts offer with IP, mask, gateway, DNS
3. REQUEST   — Client broadcasts acceptance of offer
4. ACK       — Server confirms assignment
(NACK = rejected)</pre>

<h4>DHCP Server Configuration (IOS)</h4>
<pre>R1(config)# ip dhcp excluded-address 192.168.1.1 192.168.1.10
R1(config)# ip dhcp pool LAN_POOL
R1(dhcp-config)# network 192.168.1.0 255.255.255.0
R1(dhcp-config)# default-router 192.168.1.1
R1(dhcp-config)# dns-server 8.8.8.8 8.8.4.4
R1(dhcp-config)# domain-name company.local
R1(dhcp-config)# lease 7              ! Days

! Verify
R1# show ip dhcp binding
R1# show ip dhcp pool
R1# show ip dhcp conflict</pre>

<h4>DHCP Relay (IP Helper)</h4>
<pre>! When DHCP server is on different subnet
R1(config)# interface gi0/1             ! Interface facing clients
R1(config-if)# ip helper-address 10.0.0.100  ! DHCP server IP</pre>

<h3 id="dhcpv6">DHCPv6</h3>
<pre>! Stateless DHCPv6 (SLAAC + options)
R1(config)# ipv6 dhcp pool IPV6_POOL
R1(config-dhcpv6)# dns-server 2001:4860:4860::8888
R1(config)# interface gi0/0
R1(config-if)# ipv6 dhcp server IPV6_POOL
R1(config-if)# ipv6 nd other-config-flag  ! Set O flag in RA

! Stateful DHCPv6
R1(config-if)# ipv6 nd managed-config-flag  ! Set M flag in RA</pre>

<h3 id="dns-domain-name-system">DNS — Domain Name System</h3>
<p>Resolves hostnames to IP addresses. Hierarchical distributed database.</p>
<div class="tbl-wrap"><table>
<tr><th>Record Type</th><th>Purpose</th></tr>
<tr><td>A</td><td>IPv4 address record</td></tr>
<tr><td>AAAA</td><td>IPv6 address record</td></tr>
<tr><td>CNAME</td><td>Alias/canonical name</td></tr>
<tr><td>MX</td><td>Mail exchanger</td></tr>
<tr><td>NS</td><td>Name server</td></tr>
<tr><td>PTR</td><td>Reverse lookup (IP → hostname)</td></tr>
<tr><td>SOA</td><td>Start of authority</td></tr>
<tr><td>TXT</td><td>Text records (SPF, DKIM, verification)</td></tr>
</table></div>

<h4>DNS Resolution Order (Windows)</h4>
<pre>1. Local cache
2. hosts file (C:\Windows\System32\drivers\etc\hosts)
3. DNS server query (recursive → iterative)</pre>
`

<h2 id="ntp-snmp-syslog">NTP, SNMP & Syslog</h2>
<span class="topic-tag" style="background:rgba(255,79,109,0.15);color:#ff4f6d">WAN & Services</span>

<h3 id="ntp-network-time-protocol">NTP — Network Time Protocol</h3>
<p>Synchronizes clocks across network devices. Uses UDP port 123. Stratum levels indicate accuracy.</p>
<ul>
<li><strong>Stratum 0:</strong> Atomic clock / GPS (reference clock)</li>
<li><strong>Stratum 1:</strong> Directly synced to Stratum 0 (NTP servers)</li>
<li><strong>Stratum 2:</strong> Synced to Stratum 1 servers</li>
<li>…up to Stratum 15. Stratum 16 = unsynchronized.</li>
</ul>
<pre>R1(config)# ntp server 216.239.35.0      ! Google NTP
R1(config)# ntp server 10.0.0.1 prefer
R1(config)# ntp master 2                 ! Make this router NTP master (stratum 2)
R1(config)# ntp update-calendar
R1(config)# clock timezone EST -5

R1# show ntp status
R1# show ntp associations</pre>

<h3 id="snmp-simple-network-management-protocol">SNMP — Simple Network Management Protocol</h3>
<p>Used for network monitoring and management. UDP ports 161 (queries) and 162 (traps).</p>
<div class="tbl-wrap"><table>
<tr><th>Version</th><th>Security</th><th>Notes</th></tr>
<tr><td>SNMPv1</td><td>Community string (cleartext)</td><td>Legacy. Read-only and read-write communities.</td></tr>
<tr><td>SNMPv2c</td><td>Community string (cleartext)</td><td>Better performance, bulk operations. Still insecure.</td></tr>
<tr><td>SNMPv3</td><td>Authentication + Encryption</td><td>Recommended. Auth: MD5/SHA. Encrypt: DES/AES.</td></tr>
</table></div>

<h4>SNMP Components</h4>
<ul>
<li><strong>MIB:</strong> Management Information Base — database of manageable objects</li>
<li><strong>OID:</strong> Object Identifier — unique address of MIB object</li>
<li><strong>Manager (NMS):</strong> Sends queries (GET, SET), receives traps</li>
<li><strong>Agent:</strong> Runs on managed device, responds to queries, sends traps/informs</li>
</ul>

<pre>! SNMPv2c
R1(config)# snmp-server community PUBLIC ro
R1(config)# snmp-server community PRIVATE rw
R1(config)# snmp-server host 10.0.0.10 version 2c PUBLIC
R1(config)# snmp-server enable traps

! SNMPv3
R1(config)# snmp-server group ADMIN v3 priv
R1(config)# snmp-server user NETADMIN ADMIN v3 auth sha Auth@123 priv aes 128 Priv@123</pre>

<h3 id="syslog">Syslog</h3>
<p>Standard for message logging. UDP port 514. Severity levels (0 = most critical):</p>
<div class="tbl-wrap"><table>
<tr><th>Level</th><th>Name</th><th>Description</th></tr>
<tr><td>0</td><td>Emergency</td><td>System unusable</td></tr>
<tr><td>1</td><td>Alert</td><td>Immediate action needed</td></tr>
<tr><td>2</td><td>Critical</td><td>Critical conditions</td></tr>
<tr><td>3</td><td>Error</td><td>Error conditions</td></tr>
<tr><td>4</td><td>Warning</td><td>Warning conditions</td></tr>
<tr><td>5</td><td>Notice</td><td>Normal but significant</td></tr>
<tr><td>6</td><td>Informational</td><td>Informational messages</td></tr>
<tr><td>7</td><td>Debug</td><td>Debug-level messages</td></tr>
</table></div>
<div class="note"><strong>Mnemonic:</strong> Every Awful Clown Eats Worms Never Inviting Dogs</div>
<pre>R1(config)# logging 10.0.0.20              ! Syslog server IP
R1(config)# logging trap warnings          ! Send level 4 and below
R1(config)# logging on
R1(config)# logging buffered 16384 debugging  ! Local buffer

R1# show logging</pre>
`

<h2 id="qos-quality-of-service">QoS — Quality of Service</h2>
<span class="topic-tag" style="background:rgba(255,79,109,0.15);color:#ff4f6d">WAN & Services</span>

<h3 id="why-qos">Why QoS?</h3>
<p>Networks have limited bandwidth. QoS prioritizes traffic to ensure latency-sensitive applications (voice, video) get preferential treatment over less time-sensitive traffic (file transfers, email).</p>

<h3 id="qos-characteristics">QoS Characteristics</h3>
<ul>
<li><strong>Bandwidth:</strong> Available capacity in bits per second</li>
<li><strong>Delay (Latency):</strong> Time for packet to travel from source to destination</li>
<li><strong>Jitter:</strong> Variation in delay between packets</li>
<li><strong>Loss:</strong> Percentage of packets dropped</li>
</ul>

<h4>Recommended QoS Values</h4>
<div class="tbl-wrap"><table>
<tr><th>Application</th><th>Max Delay (one-way)</th><th>Max Jitter</th><th>Max Loss</th></tr>
<tr><td>VoIP</td><td>150 ms</td><td>30 ms</td><td>1%</td></tr>
<tr><td>Video</td><td>200 ms</td><td>50 ms</td><td>0.1%</td></tr>
<tr><td>Data</td><td>N/A</td><td>N/A</td><td>Variable</td></tr>
</table></div>

<h3 id="qos-models">QoS Models</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Best Effort</div><p>No QoS. All packets treated equally. Default in most networks.</p></div>
<div class="card"><div class="card-title">IntServ (RSVP)</div><p>Integrated Services. Per-flow resource reservation using RSVP. Guarantees but doesn't scale well.</p></div>
<div class="card"><div class="card-title">DiffServ</div><p>Differentiated Services. Marks packets with DSCP/IP Precedence. Scalable. Most common in enterprise.</p></div>
</div>

<h3 id="qos-marking">QoS Marking</h3>
<div class="tbl-wrap"><table>
<tr><th>Field</th><th>Bits</th><th>Location</th><th>Values</th></tr>
<tr><td>IP Precedence</td><td>3</td><td>IPv4 TOS byte</td><td>0–7</td></tr>
<tr><td>DSCP</td><td>6</td><td>IPv4 TOS / IPv6 Traffic Class</td><td>0–63 (EF=46, AF=10-43, CS=0-56)</td></tr>
<tr><td>CoS (802.1p)</td><td>3</td><td>802.1Q frame tag</td><td>0–7</td></tr>
</table></div>

<h3 id="qos-queuing-methods">QoS Queuing Methods</h3>
<ul>
<li><strong>FIFO:</strong> First-In, First-Out. No prioritization. Default.</li>
<li><strong>WFQ:</strong> Weighted Fair Queuing. Automatic classification.</li>
<li><strong>CBWFQ:</strong> Class-Based WFQ. Traffic classes with bandwidth guarantees.</li>
<li><strong>LLQ:</strong> Low Latency Queuing. CBWFQ + priority queue for voice. Recommended for VoIP.</li>
<li><strong>PQ:</strong> Priority Queuing. 4 queues (high/medium/normal/low). Can starve lower queues.</li>
</ul>

<h3 id="qos-configuration-mqc">QoS Configuration (MQC)</h3>
<pre>! Step 1: Classification
class-map match-any VOICE
 match dscp ef
 match ip dscp 46

class-map match-all VIDEO
 match dscp af41

! Step 2: Policy
policy-map WAN_POLICY
 class VOICE
  priority 256           ! LLQ strict priority
 class VIDEO
  bandwidth 512          ! Guarantee 512 kbps
 class class-default
  fair-queue

! Step 3: Apply to interface
interface serial0/0/0
 service-policy output WAN_POLICY</pre>
`
},

<h2 id="access-control-lists-acls">Access Control Lists (ACLs)</h2>
<span class="topic-tag" style="background:rgba(123,97,255,0.15);color:#7b61ff">Security</span>

<h3 id="acl-overview">ACL Overview</h3>
<p>ACLs are ordered lists of permit/deny statements used to filter traffic. Processed top-to-bottom; first match wins. Implicit deny all at end.</p>

<h3 id="acl-types">ACL Types</h3>
<div class="card-grid">
<div class="card"><div class="card-title">Standard ACL (1–99, 1300–1999)</div><p>Filters by source IP address only. Place close to destination. Simple but limited.</p></div>
<div class="card"><div class="card-title">Extended ACL (100–199, 2000–2699)</div><p>Filters by source IP, destination IP, protocol, ports. Place close to source. More precise.</p></div>
<div class="card"><div class="card-title">Named ACL</div><p>Uses names instead of numbers. Both standard and extended. Easier to manage, edit, delete individual entries.</p></div>
</div>

<h3 id="wildcard-masks">Wildcard Masks</h3>
<p>Wildcard masks are the inverse of subnet masks. 0 = must match, 1 = don't care.</p>
<pre>255.255.255.0 subnet mask → 0.0.0.255 wildcard
255.255.255.252 → 0.0.0.3

Special:
  host  = 0.0.0.0    (matches exact IP)
  any   = 255.255.255.255 (matches all)</pre>

<h3 id="standard-acl-configuration">Standard ACL Configuration</h3>
<pre>! Numbered
R1(config)# access-list 10 permit 192.168.1.0 0.0.0.255
R1(config)# access-list 10 deny any

! Named
R1(config)# ip access-list standard ALLOW_LAN
R1(config-std-nacl)# permit 192.168.1.0 0.0.0.255
R1(config-std-nacl)# deny any log

! Apply to interface
R1(config)# interface gi0/0
R1(config-if)# ip access-group 10 in      ! inbound
R1(config-if)# ip access-group ALLOW_LAN out  ! outbound

! Apply to VTY lines
R1(config)# line vty 0 15
R1(config-line)# access-class 10 in</pre>

<h3 id="extended-acl-configuration">Extended ACL Configuration</h3>
<pre>R1(config)# ip access-list extended CORP_POLICY
! Permit HTTP/HTTPS from sales to server
R1(config-ext-nacl)# permit tcp 192.168.10.0 0.0.0.255 host 10.0.0.5 eq 80
R1(config-ext-nacl)# permit tcp 192.168.10.0 0.0.0.255 host 10.0.0.5 eq 443
! Permit ICMP for troubleshooting
R1(config-ext-nacl)# permit icmp 192.168.10.0 0.0.0.255 any
! Block Telnet everywhere
R1(config-ext-nacl)# deny tcp any any eq 23
! Permit everything else
R1(config-ext-nacl)# permit ip any any

R1(config)# interface gi0/0
R1(config-if)# ip access-group CORP_POLICY in</pre>

<h3 id="acl-verification">ACL Verification</h3>
<pre>show ip access-lists           ! All ACLs with match counts
show ip access-lists 10        ! Specific ACL
show ip interface gi0/0        ! Check which ACLs applied to interface
show running-config | include access</pre>

<h3 id="acl-best-practices">ACL Best Practices</h3>
<ul>
<li>Standard ACLs: place near destination</li>
<li>Extended ACLs: place near source</li>
<li>Most specific entries first</li>
<li>Remember implicit deny — add explicit permit if needed</li>
<li>Use <code>log</code> keyword to log matches</li>
<li>Use named ACLs for easier editing</li>
<li>Always verify with <code>show ip access-lists</code> (check counters)</li>
</ul>
`

<h2 id="wireless-security">Wireless Security</h2>
<span class="topic-tag" style="background:rgba(123,97,255,0.15);color:#7b61ff">Security</span>

<h3 id="wireless-security-standards">Wireless Security Standards</h3>
<div class="tbl-wrap"><table>
<tr><th>Standard</th><th>Encryption</th><th>Auth</th><th>Security</th></tr>
<tr><td>WEP</td><td>RC4 (40/104-bit)</td><td>PSK</td><td>Broken — do not use</td></tr>
<tr><td>WPA</td><td>TKIP (RC4)</td><td>PSK / 802.1X</td><td>Weak — legacy only</td></tr>
<tr><td>WPA2</td><td>CCMP (AES-128)</td><td>PSK / 802.1X</td><td>Good — current standard</td></tr>
<tr><td>WPA3</td><td>GCMP (AES-192/256)</td><td>SAE / 802.1X</td><td>Best — latest standard</td></tr>
</table></div>

<h3 id="wpa2-wpa3-modes">WPA2/WPA3 Modes</h3>
<ul>
<li><strong>Personal (PSK):</strong> Pre-shared key. All users share same password. Home/small business.</li>
<li><strong>Enterprise (802.1X):</strong> Per-user authentication via RADIUS server. EAP variants. Enterprise use.</li>
</ul>

<h3 id="802-1x-components">802.1X Components</h3>
<ul>
<li><strong>Supplicant:</strong> Client device (PC, phone) — sends credentials</li>
<li><strong>Authenticator:</strong> Switch or AP — relays auth between supplicant and server</li>
<li><strong>Authentication Server:</strong> RADIUS server — verifies credentials</li>
</ul>

<h3 id="wireless-threats">Wireless Threats</h3>
<ul>
<li><strong>Rogue AP:</strong> Unauthorized AP on the network. Detected via WIDS/WIPS.</li>
<li><strong>Evil Twin:</strong> AP with same SSID as legitimate AP. MITM attack.</li>
<li><strong>Deauthentication Attack:</strong> Spoofed deauth frames force client disconnect.</li>
<li><strong>War Driving:</strong> Discovering wireless networks from a moving vehicle.</li>
<li><strong>KRACK:</strong> Key Reinstallation Attack targeting WPA2 handshake.</li>
</ul>

<h3 id="wireless-best-practices">Wireless Best Practices</h3>
<ul>
<li>Use WPA3 or WPA2-Enterprise where possible</li>
<li>Change default SSID and admin credentials</li>
<li>Use separate VLANs for guest and corporate wireless</li>
<li>Enable WIDS/WIPS to detect rogue APs</li>
<li>Disable WPS (Wi-Fi Protected Setup)</li>
<li>Use 802.1X for enterprise authentication</li>
<li>Implement wireless IPS for monitoring</li>
</ul>
`

R1(config-if)# no lldp transmit    ! Disable TX

R1# show lldp neighbors
R1# show lldp neighbors detail</pre>

<h2 id="network-troubleshooting">Network Troubleshooting</h2>
<span class="topic-tag" style="background:rgba(0,201,255,0.15);color:#00c9ff">Network Fundamentals</span>

<h3 id="troubleshooting-methodology">Troubleshooting Methodology</h3>
<ol>
<li><strong>Define the problem</strong> — gather symptoms, affected users/systems</li>
<li><strong>Gather information</strong> — logs, show commands, topology</li>
<li><strong>Analyze information</strong> — compare baseline vs. current state</li>
<li><strong>Eliminate possible causes</strong> — rule out options systematically</li>
<li><strong>Propose hypothesis</strong> — most likely cause</li>
<li><strong>Test hypothesis</strong> — implement solution in test/change window</li>
<li><strong>Solve the problem</strong> — implement fix</li>
<li><strong>Document solution</strong> — update records</li>
</ol>

<h3 id="troubleshooting-approaches">Troubleshooting Approaches</h3>
<ul>
<li><strong>Top-down:</strong> Start at Application layer, work down. Good for application-specific issues.</li>
<li><strong>Bottom-up:</strong> Start at Physical layer, work up. Good for connectivity issues.</li>
<li><strong>Divide and conquer:</strong> Start at middle (Network layer), work up or down based on results.</li>
<li><strong>Follow the path:</strong> Trace packet route from source to destination.</li>
<li><strong>Spot the differences:</strong> Compare working vs. non-working configurations.</li>
</ul>

<h3 id="key-troubleshooting-commands">Key Troubleshooting Commands</h3>
<pre>! Connectivity
ping 8.8.8.8                    ! Basic ping
ping 8.8.8.8 repeat 100 size 1472  ! Extended ping
traceroute 8.8.8.8               ! Path discovery
traceroute 8.8.8.8 source gi0/0  ! Source-based traceroute

! Routing
show ip route
show ip route 192.168.1.0
show ip protocols
show ip ospf neighbor
show ip eigrp neighbors
show ip bgp summary

! Interfaces
show interfaces
show interfaces gi0/0
show interfaces status           ! Switch
show ip interface brief
show ip interface gi0/0

! Layer 2
show mac address-table
show spanning-tree
show vlan brief
show interfaces trunk
show cdp neighbors detail

! System
show version
show running-config
show startup-config
show processes cpu
show memory</pre>

<h3 id="common-issues-solutions">Common Issues & Solutions</h3>
<div class="tbl-wrap"><table>
<tr><th>Symptom</th><th>Possible Cause</th><th>Check</th></tr>
<tr><td>Can't ping default gateway</td><td>Wrong IP/mask, interface down, ACL</td><td>show ip interface brief, show ip access-lists</td></tr>
<tr><td>Can ping gateway, not remote</td><td>Routing issue, ACL</td><td>show ip route, traceroute</td></tr>
<tr><td>Interface is down/down</td><td>Cable, wrong speed/duplex, shutdown</td><td>show interfaces, no shutdown</td></tr>
<tr><td>Interface is up/down</td><td>Layer 2 issue, encapsulation mismatch</td><td>show interfaces, check encapsulation</td></tr>
<tr><td>OSPF neighbors not forming</td><td>Area mismatch, hello/dead timers, network type</td><td>show ip ospf neighbor, debug ip ospf adj</td></tr>
<tr><td>No DHCP address</td><td>No DHCP server, helper-address, pool empty</td><td>show ip dhcp pool, show ip dhcp binding</td></tr>
<tr><td>Slow network</td><td>Duplex mismatch, high CPU, spanning tree</td><td>show interfaces (errors), show processes cpu</td></tr>
</table></div>

<h3 id="ios-debugging">IOS Debugging</h3>
<pre>debug ip packet                  ! Layer 3 packets (high overhead!)
debug ip routing                 ! Routing table changes
debug ip ospf events             ! OSPF events
debug ip dhcp server events      ! DHCP events
undebug all                      ! Stop all debugging
terminal monitor                 ! See debug output in SSH session</pre>
<div class="danger-box"><strong>Warning:</strong> Debug commands can overwhelm a router's CPU. Use with caution in production. Always <code>undebug all</code> when done.</div>
`

<h2 id="hsrp-first-hop-redundancy-protocols">HSRP & First Hop Redundancy Protocols</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="fhrp-overview">FHRP Overview</h3>
<p>First Hop Redundancy Protocols provide a virtual gateway IP/MAC so hosts can continue communicating if the primary router fails.</p>

<h3 id="hsrp-hot-standby-router-protocol">HSRP — Hot Standby Router Protocol</h3>
<ul>
<li>Cisco-proprietary</li>
<li>One Active router, one Standby, others in Listen state</li>
<li>Virtual IP + virtual MAC (0000.0C07.ACxx for HSRPv1)</li>
<li>Hellos: every 3 seconds. Hold time: 10 seconds.</li>
<li>Priority: default 100. Highest priority = Active.</li>
<li>Preemption disabled by default</li>
</ul>
<pre>R1(config)# interface gi0/0

R1(config-if)# standby 1 track gi0/1 decrement 20  ! Reduce priority if WAN fails

<h3 id="hsrp-vs-vrrp-vs-glbp">HSRP vs VRRP vs GLBP</h3>
<div class="tbl-wrap"><table>
<tr><th>Protocol</th><th>Standard</th><th>Active</th><th>Load Balance</th><th>Virtual MAC</th></tr>
<tr><td>HSRP v1</td><td>Cisco</td><td>1 active, 1 standby</td><td>No (per-group)</td><td>0000.0C07.ACxx</td></tr>

<tr><td>GLBP</td><td>Cisco</td><td>1 AVG + multiple AVF</td><td>Yes (per-host)</td><td>0007.B400.xxyy</td></tr>

<h2 id="cloud-computing-virtualization">Cloud Computing & Virtualization</h2>
<span class="topic-tag" style="background:rgba(0,201,255,0.15);color:#00c9ff">Automation</span>

<h3 id="cloud-service-models">Cloud Service Models</h3>
<div class="card-grid">
<div class="card"><div class="card-title">IaaS — Infrastructure as a Service</div><p>Provides compute, storage, networking. You manage OS and above. Examples: AWS EC2, Azure VMs, Google Compute Engine.</p></div>
<div class="card"><div class="card-title">PaaS — Platform as a Service</div><p>Provides development platform, runtime, middleware. You manage application and data. Examples: Heroku, AWS Elastic Beanstalk, Google App Engine.</p></div>
<div class="card"><div class="card-title">SaaS — Software as a Service</div><p>Fully managed software. You use the application. Examples: Office 365, Salesforce, Google Workspace, WebEx.</p></div>
</div>

<h3 id="cloud-deployment-models">Cloud Deployment Models</h3>
<ul>
<li><strong>Public Cloud:</strong> Resources shared among multiple customers. Owned by provider (AWS, Azure, GCP). Pay-per-use.</li>
<li><strong>Private Cloud:</strong> Resources dedicated to one organization. On-premises or hosted. More control, higher cost.</li>
<li><strong>Hybrid Cloud:</strong> Mix of public and private. Data can move between them. Most common enterprise approach.</li>
<li><strong>Community Cloud:</strong> Shared by organizations with common interests (healthcare, government).</li>
</ul>

<h3 id="virtualization">Virtualization</h3>
<ul>
<li><strong>Hypervisor Type 1 (Bare Metal):</strong> Runs directly on hardware. VMware ESXi, Hyper-V, KVM. Better performance.</li>
<li><strong>Hypervisor Type 2 (Hosted):</strong> Runs on OS. VMware Workstation, VirtualBox. Easier to deploy.</li>
<li><strong>Containers:</strong> Share OS kernel. Docker, Kubernetes. Lighter than VMs. Fast startup.</li>
<li><strong>NFV (Network Functions Virtualization):</strong> Run network functions (firewall, load balancer) as software on commodity hardware.</li>
<li><strong>SDN (Software-Defined Networking):</strong> Separates control plane from data plane. Centralized controller (e.g., OpenFlow).</li>
</ul>

<h3 id="sdn-architecture">SDN Architecture</h3>
<pre>┌─────────────────────────────┐
│    Applications / Business   │  ← Application Layer
│    (NMS, Security, Analytics)│
└──────────────┬──────────────┘
               │ Northbound API (REST)
┌──────────────▼──────────────┐
│       SDN Controller         │  ← Control Plane (centralized)
│    (OpenDaylight, ONOS)      │
└──────────────┬──────────────┘
               │ Southbound API (OpenFlow, NETCONF, gRPC)
┌──────────────▼──────────────┐
│    Network Infrastructure    │  ← Data Plane (forwarding)
│    (Switches, Routers)       │
└─────────────────────────────┘</pre>

<div class="note"><strong>Traditional vs SDN:</strong> In traditional networks, each device has both control plane (routing decisions) and data plane (forwarding). In SDN, the control plane is centralized in a controller, leaving devices to focus on forwarding.</div>
`

<h2 id="layer-3-forwarding-arp">Layer 3 Forwarding & ARP</h2>
<span class="topic-tag" style="background:rgba(255,159,64,0.15);color:#ff9f40">Routing</span>

<h3 id="arp-address-resolution-protocol">ARP — Address Resolution Protocol</h3>
<p>Maps Layer 3 IP addresses to Layer 2 MAC addresses.</p>
<pre>Process:
1. Host A wants to send to 192.168.1.2
2. Checks ARP cache — not found
3. Sends ARP Request (broadcast): "Who has 192.168.1.2? Tell 192.168.1.1"
4. Host B receives request, replies (unicast): "192.168.1.2 is at AA:BB:CC:DD:EE:FF"
5. Host A caches mapping, sends frame</pre>
<pre>show arp                         ! View ARP table
arp -a                           ! Windows
ip neigh show                    ! Linux</pre>

<h3 id="proxy-arp">Proxy ARP</h3>
<p>Router responds to ARP requests on behalf of a host in another subnet. Allows hosts with incorrect subnet masks to still communicate. Usually enabled by default; disable if not needed:</p>
<pre>R1(config-if)# no ip proxy-arp</pre>

<h3 id="packet-forwarding-process">Packet Forwarding Process</h3>
<pre>1. Receive frame, check destination MAC
2. If MAC matches, strip L2 header → inspect IP packet
3. Check TTL — decrement by 1. If TTL=0, discard + ICMP TTL exceeded
4. Look up destination IP in routing table (longest prefix match)
5. Determine exit interface and next-hop IP
6. ARP for next-hop MAC (if Ethernet)
7. Build new L2 frame with next-hop MAC, forward</pre>

<h3 id="icmp-internet-control-message-protocol">ICMP — Internet Control Message Protocol</h3>
<div class="tbl-wrap"><table>
<tr><th>Type</th><th>Name</th><th>Common Use</th></tr>
<tr><td>0</td><td>Echo Reply</td><td>Ping response</td></tr>
<tr><td>3</td><td>Destination Unreachable</td><td>Can't reach host/port/network</td></tr>
<tr><td>5</td><td>Redirect</td><td>Better route available</td></tr>
<tr><td>8</td><td>Echo Request</td><td>Ping</td></tr>
<tr><td>11</td><td>Time Exceeded</td><td>TTL expired (traceroute uses this)</td></tr>
</table></div>
